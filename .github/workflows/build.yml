name: Automotive Advanced CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y lcov cppcheck clang-format

    - name: Run Linter (clang-format)
      run: clang-format --dry-run --Werror main.cpp SpeedMonitor.h SpeedMonitor.cpp test.cpp

    - name: Static Analysis (cppcheck)
      run: cppcheck --language=c++ --error-exitcode=1 main.cpp SpeedMonitor.h SpeedMonitor.cpp test.cpp

    - name: Configure CMake
      run: cmake -B build

    - name: Build
      run: cmake --build build

    - name: Run Tests (with ASAN memory checks)
      working-directory: build
      run: ctest --output-on-failure

    - name: Generate Code Coverage Report
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutomotiveApp-Executable
        path: build/AutomotiveApp
